<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#3F4021" />
<title>LW Sales Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --lw-olive: #3F4021; --lw-cream: #F5F1E6; --lw-sand: #D6D0B8; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--lw-cream); }
  .lw-bg-olive { background-color: var(--lw-olive); }
  .lw-text-olive { color: var(--lw-olive); }
  .lw-bg-sand { background-color: var(--lw-sand); }
  .lw-border-olive { border-color: var(--lw-olive); }
  /* hide scrollbars on horizontal tables but keep functionality */
  .scroll-x::-webkit-scrollbar { height: 6px; }
  .scroll-x::-webkit-scrollbar-thumb { background: rgba(63,64,33,0.3); border-radius: 3px; }
  /* sticky first column for wide tracker tables on mobile */
  .sticky-col { position: sticky; left: 0; background: inherit; z-index: 2; }
  /* spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.8s linear infinite; }
</style>
</head>
<body class="min-h-screen lw-text-olive">

<!-- ====== HEADER ====== -->
<header class="lw-bg-olive text-white px-4 py-4 sm:py-5 shadow-md">
  <div class="max-w-6xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
    <div>
      <h1 class="text-xl sm:text-2xl font-bold">LW Sales Dashboard</h1>
      <p id="asOf" class="text-xs sm:text-sm opacity-75">Loading…</p>
    </div>
    <button id="refreshBtn" class="self-start sm:self-auto inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 active:bg-white/30 px-3 py-2 rounded text-sm transition">
      <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-3.5-7.1"/><path d="M21 4v5h-5"/></svg>
      Refresh
    </button>
  </div>
</header>

<!-- ====== TABS ====== -->
<nav class="sticky top-0 z-10 lw-bg-sand border-b lw-border-olive">
  <div class="max-w-6xl mx-auto flex overflow-x-auto scroll-x">
    <button data-tab="daily"   class="tab-btn flex-shrink-0 px-4 py-3 text-sm font-medium border-b-2 border-transparent transition">Daily</button>
    <button data-tab="weekly"  class="tab-btn flex-shrink-0 px-4 py-3 text-sm font-medium border-b-2 border-transparent transition">Weekly</button>
    <button data-tab="monthly" class="tab-btn flex-shrink-0 px-4 py-3 text-sm font-medium border-b-2 border-transparent transition">Monthly</button>
    <button data-tab="reps"    class="tab-btn flex-shrink-0 px-4 py-3 text-sm font-medium border-b-2 border-transparent transition">Reps</button>
  </div>
</nav>

<!-- ====== MAIN ====== -->
<main class="max-w-6xl mx-auto px-3 sm:px-6 py-4 sm:py-6">

  <!-- Loading / Error state -->
  <div id="status" class="text-center py-10">
    <svg class="spinner mx-auto h-8 w-8 lw-text-olive" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M22 12a10 10 0 0 1-10 10" /></svg>
    <p class="mt-3 text-sm opacity-70">Fetching latest numbers…</p>
  </div>

  <!-- Daily -->
  <section id="tab-daily" class="hidden">
    <div class="grid gap-6">
      <div data-block="yesterday"></div>
      <div data-block="wtd"></div>
      <div data-block="mtd"></div>
    </div>
  </section>

  <!-- Weekly -->
  <section id="tab-weekly" class="hidden">
    <h2 class="text-lg font-bold mb-3">Weekly Tracker</h2>
    <div id="weeklyTable" class="overflow-x-auto scroll-x rounded-lg shadow-sm bg-white"></div>
  </section>

  <!-- Monthly -->
  <section id="tab-monthly" class="hidden">
    <h2 class="text-lg font-bold mb-3">Monthly Tracker</h2>
    <div id="monthlyTable" class="overflow-x-auto scroll-x rounded-lg shadow-sm bg-white"></div>
  </section>

  <!-- Reps -->
  <section id="tab-reps" class="hidden">
    <div class="mb-3 flex flex-wrap gap-2" id="repTabs"></div>
    <div id="repContent"></div>
  </section>

</main>

<footer class="text-center text-xs opacity-50 py-4">
  Sales Dashboard · live data from Google Sheets
</footer>

<script>
  // ===== CONFIG =====
  // Paste your Apps Script Web App URL here (ends in /exec)
  const API_URL = 'PASTE_WEB_APP_URL_HERE';

  // ===== STATE =====
  let data = null;
  let activeTab = 'daily';
  let activeRep = null;

  // ===== UTILS =====
  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  function fmtNum(n) {
    if (n === null || n === undefined || n === '' || isNaN(n)) return '–';
    return Math.round(Number(n)).toLocaleString();
  }
  function fmtPct(n) {
    if (n === null || n === undefined || n === '' || isNaN(n)) return '–';
    return (Number(n) * 100).toFixed(1) + '%';
  }
  function fmtMoney(n) {
    if (n === null || n === undefined || n === '' || isNaN(n)) return '–';
    return '$' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  // ===== FETCH =====
  async function load() {
    showStatus('Fetching latest numbers…', true);
    try {
      if (!API_URL || API_URL.includes('PASTE_WEB_APP_URL')) {
        throw new Error('API_URL not configured. Edit index.html and paste your Apps Script Web App URL.');
      }
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      data = json;
      $('#asOf').textContent = 'As of ' + new Date(data.asOf).toLocaleString();
      render();
    } catch (err) {
      showStatus('Failed to load: ' + err.message, false);
    }
  }

  function showStatus(msg, loading) {
    $('#status').classList.remove('hidden');
    $('#status').innerHTML = loading
      ? `<svg class="spinner mx-auto h-8 w-8 lw-text-olive" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M22 12a10 10 0 0 1-10 10"/></svg><p class="mt-3 text-sm opacity-70">${msg}</p>`
      : `<p class="text-red-700 font-medium">⚠️ ${msg}</p>`;
    ['daily','weekly','monthly','reps'].forEach(t => $('#tab-' + t).classList.add('hidden'));
  }

  // ===== RENDER =====
  function render() {
    $('#status').classList.add('hidden');
    renderDaily();
    renderWeekly();
    renderMonthly();
    renderReps();
    showTab(activeTab);
  }

  function renderDaily() {
    const labels = { yesterday: 'Yesterday', wtd: 'Week to Date', mtd: 'Month to Date' };
    ['yesterday','wtd','mtd'].forEach(key => {
      const d = data.daily[key];
      const el = $(`[data-block="${key}"]`);
      el.innerHTML = `
        <h2 class="text-lg font-bold mb-3">${labels[key]}</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2 sm:gap-3">
          ${kpi('Calls Booked', fmtNum(d.callsBooked))}
          ${kpi('Live Calls',   fmtNum(d.liveCalls))}
          ${kpi('Show Rate',    fmtPct(d.showRate),    'accent')}
          ${kpi('Offers Made',  fmtNum(d.offersMade))}
          ${kpi('Offer Rate',   fmtPct(d.offerRate))}
          ${kpi('Sales',        fmtNum(d.sales),       'accent')}
          ${kpi('Close (Live)', fmtPct(d.closeRateLive))}
          ${kpi('Close (Offer)', fmtPct(d.closeRateOffers))}
          ${kpi('Cash',         fmtMoney(d.cashCollected), 'money')}
          ${kpi('Revenue',      fmtMoney(d.revenue),       'money')}
        </div>`;
    });
  }

  function kpi(label, value, variant) {
    const valColor = variant === 'accent' ? 'lw-text-olive'
                    : variant === 'money' ? 'text-green-700'
                    : 'lw-text-olive';
    return `
      <div class="bg-white rounded-lg p-3 sm:p-4 shadow-sm">
        <div class="text-[10px] sm:text-xs uppercase tracking-wide opacity-60">${label}</div>
        <div class="text-lg sm:text-2xl font-bold mt-1 ${valColor}">${value}</div>
      </div>`;
  }

  function renderWeekly() {
    $('#weeklyTable').innerHTML = trackerTable(data.weekly, 'Week');
  }
  function renderMonthly() {
    $('#monthlyTable').innerHTML = trackerTable(data.monthly, 'Month');
  }

  function trackerTable(rows, labelHeader) {
    if (!rows || !rows.length) return '<p class="p-4 text-sm opacity-60">No data.</p>';
    const header = `
      <thead class="lw-bg-olive text-white text-xs uppercase tracking-wide">
        <tr>
          <th class="sticky-col lw-bg-olive text-left px-3 py-2">${labelHeader}</th>
          <th class="text-right px-3 py-2">Calls</th>
          <th class="text-right px-3 py-2">Live</th>
          <th class="text-right px-3 py-2">Show %</th>
          <th class="text-right px-3 py-2">Sales</th>
          <th class="text-right px-3 py-2">Close %</th>
          <th class="text-right px-3 py-2">Cash</th>
          <th class="text-right px-3 py-2">Revenue</th>
        </tr>
      </thead>`;
    const body = rows.map((r, i) => `
      <tr class="${i % 2 ? 'bg-stone-50' : 'bg-white'} text-sm">
        <td class="sticky-col ${i % 2 ? 'bg-stone-50' : 'bg-white'} font-medium px-3 py-2 whitespace-nowrap">${r.label}</td>
        <td class="text-right px-3 py-2">${fmtNum(r.callsBooked)}</td>
        <td class="text-right px-3 py-2">${fmtNum(r.liveCalls)}</td>
        <td class="text-right px-3 py-2 font-medium">${fmtPct(r.showRate)}</td>
        <td class="text-right px-3 py-2">${fmtNum(r.sales)}</td>
        <td class="text-right px-3 py-2 font-medium">${fmtPct(r.closeRate)}</td>
        <td class="text-right px-3 py-2 text-green-700">${fmtMoney(r.cash)}</td>
        <td class="text-right px-3 py-2 text-green-700">${fmtMoney(r.revenue)}</td>
      </tr>
    `).join('');
    return `<table class="min-w-full">${header}<tbody>${body}</tbody></table>`;
  }

  function renderReps() {
    if (!data.reps || !data.reps.length) {
      $('#repTabs').innerHTML = '';
      $('#repContent').innerHTML = '<p class="p-4 text-sm opacity-60">No rep data.</p>';
      return;
    }
    // Only show reps with at least one call total
    const visibleReps = data.reps.filter(r => r.total.callsBooked && Number(r.total.callsBooked) > 0);
    if (!activeRep || !visibleReps.find(r => r.name === activeRep)) {
      activeRep = visibleReps[0]?.name;
    }
    $('#repTabs').innerHTML = visibleReps.map(r => `
      <button data-rep="${r.name}" class="rep-btn px-3 py-2 rounded text-sm font-medium transition ${r.name === activeRep ? 'lw-bg-olive text-white' : 'bg-white border lw-border-olive lw-text-olive'}">
        ${r.name}
      </button>
    `).join('');
    $$('.rep-btn').forEach(btn => btn.addEventListener('click', () => {
      activeRep = btn.dataset.rep;
      renderReps();
    }));
    const rep = visibleReps.find(r => r.name === activeRep);
    if (!rep) { $('#repContent').innerHTML = ''; return; }

    const t = rep.total;
    const totalCards = `
      <h3 class="text-base font-bold mb-2">${rep.name} · All-Time</h3>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3 mb-5">
        ${kpi('Calls', fmtNum(t.callsBooked))}
        ${kpi('Live',  fmtNum(t.liveCalls))}
        ${kpi('Show %', fmtPct(t.showRate), 'accent')}
        ${kpi('Offers', fmtNum(t.offersMade))}
        ${kpi('Sales', fmtNum(t.sales), 'accent')}
        ${kpi('Close %', fmtPct(t.closeRate))}
        ${kpi('Cash', fmtMoney(t.cash), 'money')}
        ${kpi('Revenue', fmtMoney(t.revenue), 'money')}
      </div>`;

    // Monthly table (most recent first)
    const months = [...(rep.months || [])].reverse();
    const monthBody = months.map((m, i) => `
      <tr class="${i % 2 ? 'bg-stone-50' : 'bg-white'} text-sm">
        <td class="sticky-col ${i % 2 ? 'bg-stone-50' : 'bg-white'} font-medium px-3 py-2 whitespace-nowrap">${m.label}</td>
        <td class="text-right px-3 py-2">${fmtNum(m.callsBooked)}</td>
        <td class="text-right px-3 py-2">${fmtNum(m.liveCalls)}</td>
        <td class="text-right px-3 py-2 font-medium">${fmtPct(m.showRate)}</td>
        <td class="text-right px-3 py-2">${fmtNum(m.offersMade)}</td>
        <td class="text-right px-3 py-2">${fmtNum(m.sales)}</td>
        <td class="text-right px-3 py-2 font-medium">${fmtPct(m.closeRate)}</td>
        <td class="text-right px-3 py-2 text-green-700">${fmtMoney(m.cash)}</td>
        <td class="text-right px-3 py-2 text-green-700">${fmtMoney(m.revenue)}</td>
      </tr>`).join('');

    $('#repContent').innerHTML = totalCards + `
      <h3 class="text-base font-bold mb-2">${rep.name} · By Month</h3>
      <div class="overflow-x-auto scroll-x rounded-lg shadow-sm bg-white">
        <table class="min-w-full">
          <thead class="lw-bg-olive text-white text-xs uppercase tracking-wide">
            <tr>
              <th class="sticky-col lw-bg-olive text-left px-3 py-2">Month</th>
              <th class="text-right px-3 py-2">Calls</th>
              <th class="text-right px-3 py-2">Live</th>
              <th class="text-right px-3 py-2">Show %</th>
              <th class="text-right px-3 py-2">Offers</th>
              <th class="text-right px-3 py-2">Sales</th>
              <th class="text-right px-3 py-2">Close %</th>
              <th class="text-right px-3 py-2">Cash</th>
              <th class="text-right px-3 py-2">Revenue</th>
            </tr>
          </thead>
          <tbody>${monthBody}</tbody>
        </table>
      </div>`;
  }

  // ===== TABS =====
  function showTab(name) {
    activeTab = name;
    $$('.tab-btn').forEach(b => {
      const on = b.dataset.tab === name;
      b.classList.toggle('lw-bg-olive', on);
      b.classList.toggle('text-white', on);
      b.classList.toggle('border-b-2', true);
      b.style.borderBottomColor = on ? 'var(--lw-olive)' : 'transparent';
    });
    ['daily','weekly','monthly','reps'].forEach(t => {
      $('#tab-' + t).classList.toggle('hidden', t !== name);
    });
  }

  // ===== INIT =====
  $$('.tab-btn').forEach(btn => btn.addEventListener('click', () => showTab(btn.dataset.tab)));
  $('#refreshBtn').addEventListener('click', () => {
    $('#refreshIcon').classList.add('spinner');
    load().finally(() => setTimeout(() => $('#refreshIcon').classList.remove('spinner'), 400));
  });
  showTab('daily');
  load();
</script>
</body>
</html>
